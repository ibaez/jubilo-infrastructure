# ------------------------------
# IECE_GATEWAY_IP comes from .env file
# that exists in same directory as this script
# 
services:
  iece_gateway:
    build: ../iece-gateway
    ports:
      - "443:443"
    volumes:
      - ../iece-gateway/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - iece_auth
    networks:
      - iece_network

  iece_auth:
    env_file:
      - ../iece-auth/.env
    build: ../iece-auth
    ports:
      - "8000:8000"
    volumes:
      - ../iece-auth:/app
    expose:
      - "8000"
    networks:
      - iece_network

  iece_church:
    env_file:
      - ../iece-church/.env
    build: ../iece-church
    ports:
      - "8001:8000"
    volumes:
      - ../iece-church:/app
    depends_on:
      - iece_auth
    expose:
      - "8001"
    networks:
      - iece_network

  jubilo_music_db:
    image: mysql:8
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
        MYSQL_DATABASE: jubilo_music
        MYSQL_USER: jubilo_music
        MYSQL_PASSWORD: jubilo_music
        MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
        test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
        interval: 5s
        timeout: 5s
        retries: 5
    networks:
      - iece_network

  jubilo_music:
    env_file:
      - ../jubilo-music/.env
    build: ../jubilo-music
    ports:
      - "8002:8000"
    volumes:
      - ../jubilo-music:/app
    depends_on:
      jubilo_music_db:
        condition: service_healthy
      iece_auth:
        condition: service_started
    expose:
      - "8002"
    networks:
      - iece_network

  # iece_report:
  #   build: ./iece_report
  #   env_file:
  #     - ./iece_report/.env
  #   image: iece_report
