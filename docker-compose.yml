# ------------------------------
# JUBILO_GATEWAY_IP comes from .env file
# that exists in same directory as this script
# 
services:
  jubilo_gateway:
    build: ../jubilo-gateway
    ports:
      - "443:443"
    volumes:
      - ../jubilo-gateway/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - jubilo_auth
      - jubilo_music
    networks:
      - iece_network

  jubilo_auth_db:
    image: postgres:16
    environment:
        POSTGRES_DB: jubilo_auth
        POSTGRES_USER: jubilo_auth_user
        POSTGRES_PASSWORD: jubilo_auth_password
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U jubilo_auth_user -d jubilo_auth || exit 1"]
        interval: 5s
        timeout: 5s
        retries: 5
    networks:
      - iece_network

  jubilo_auth:
    env_file:
      - ../jubilo-auth/.env
    build: ../jubilo-auth
    ports:
      - "8000:8000"
    volumes:
      - ../jubilo-auth:/app
    expose:
      - "8000"
    depends_on:
      jubilo_auth_db:
        condition: service_healthy
    networks:
      - iece_network

  iece_church:
    env_file:
      - ../iece-church/.env
    build: ../iece-church
    ports:
      - "8001:8000"
    volumes:
      - ../iece-church:/app
    depends_on:
      - jubilo_auth
    expose:
      - "8001"
    networks:
      - iece_network

  jubilo_meilisearch:
    env_file:
      - ../jubilo-music/.env
    image: getmeili/meilisearch:v1.10
    volumes:
      - ../jubilo-music/meili_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - iece_network

  jubilo_music_db:
    image: postgres:16
    environment:
        POSTGRES_DB: jubilo_music
        POSTGRES_USER: jubilo_music_user
        POSTGRES_PASSWORD: jubilo_music_password
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U jubilo_music_user -d jubilo_music || exit 1"]
        interval: 5s
        timeout: 5s
        retries: 5
    networks:
      - iece_network

  jubilo_music:
    env_file:
      - ../jubilo-music/.env
    build: ../jubilo-music
    ports:
      - "8002:8000"
    volumes:
      - ../jubilo-music:/app
    depends_on:
      jubilo_music_db:
        condition: service_healthy
      jubilo_auth:
        condition: service_started
    expose:
      - "8002"
    networks:
      - iece_network

  # iece_report:
  #   build: ./iece_report
  #   env_file:
  #     - ./iece_report/.env
  #   image: iece_report
